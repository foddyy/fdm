name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --console=plain
        timeout-minutes: 30

      - name: List APK outputs
        run: |
          echo "=== Finding APK files ==="
          find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "debug dir not found"
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "apk dir not found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/**/*.apk
          retention-days: 30
