name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download gradle-wrapper.jar
        run: |
          GRADLE_VERSION=$(grep 'distributionUrl' gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\(.*\)-bin.zip.*/\1/')
          echo "Gradle version: $GRADLE_VERSION"
          mkdir -p gradle-download
          cd gradle-download
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O gradle.zip
          unzip -q gradle.zip
          # Gradle wrapper jar location varies by version
          if [ -f "gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-*.jar" ]; then
            cp "gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-"*.jar ../gradle/wrapper/gradle-wrapper.jar
          elif [ -f "gradle-${GRADLE_VERSION}/lib/gradle-wrapper.jar" ]; then
            cp "gradle-${GRADLE_VERSION}/lib/gradle-wrapper.jar" ../gradle/wrapper/gradle-wrapper.jar
          else
            find gradle-${GRADLE_VERSION} -name "*wrapper*.jar" -exec cp {} ../gradle/wrapper/gradle-wrapper.jar \;
          fi
          echo "Copied wrapper jar:"
          ls -la ../gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: |
          echo "=== Running build ==="
          java -jar gradle/wrapper/gradle-wrapper.jar assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
