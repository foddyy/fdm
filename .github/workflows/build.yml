name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download gradle-wrapper.jar
        run: |
          GRADLE_VERSION=$(grep 'distributionUrl' gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\(.*\)-bin.zip.*/\1/')
          echo "Downloading Gradle $GRADLE_VERSION..."
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          unzip -q -o /tmp/gradle.zip -d /tmp/
          echo "Searching for gradle-wrapper.jar..."
          find /tmp/gradle-${GRADLE_VERSION} -name "gradle-wrapper-*.jar" -exec ls -la {} \;
          cp /tmp/gradle-${GRADLE_VERSION}/lib/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: |
          echo "=== Running build ==="
          java -jar gradle/wrapper/gradle-wrapper.jar assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
